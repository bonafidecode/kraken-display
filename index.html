<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>285K 24-Core Kraken Monitor</title>
  <style>
    /* Absolute reset for Kraken Elite's 640x640 circular viewport */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 640px;
      height: 640px;
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      user-select: none;
    }

    /* Circular clipping container to safely preview edges */
    .kraken-display {
      width: 640px;
      height: 640px;
      position: relative;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Core Layout Wrapper */
    .core-rings {
      position: relative;
      width: 580px;
      height: 580px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Individual Core Blocks */
    .core-node {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    /* Progress pill graphics */
    .bar-container {
      width: 12px;
      height: 38px;
      background: #1a1a1a;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      border: 1px solid #333;
    }
    .bar-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 0%;
      background: #00ff66;
      transition: height 0.15s ease-out;
    }

    .core-label {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
      color: #888;
    }

    /* Center Info Pod */
    .center-info {
      position: absolute;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .main-load {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      color: #ffffff;
    }
    .cpu-label {
      font-size: 14px;
      letter-spacing: 2px;
      color: #00ff66;
      font-weight: 600;
      margin-top: 4px;
    }
    .temp-display {
      font-size: 24px;
      font-weight: 500;
      color: #aaa;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div class="kraken-display">
    <div class="center-info">
      <div class="main-load" id="total-load">0%</div>
      <div class="cpu-label">ULTRA 9 285K</div>
      <div class="temp-display" id="cpu-temp">--°C</div>
    </div>
    
    <div class="core-rings" id="rings-container">
      <!-- Generated via JavaScript -->
    </div>
  </div>

  <script>
    const container = document.getElementById('rings-container');
    const totalLoadEl = document.getElementById('total-load');
    const cpuTempEl = document.getElementById('cpu-temp');

    // Configuration arrays specifying the circle placement geometry
    // Outer Ring: 8 P-Cores (Radius: 230px)
    // Inner Ring: 16 E-Cores (Radius: 155px)
    const pCoreCount = 8;
    const eCoreCount = 16;
    const pRadius = 230; 
    const eRadius = 155; 

    // Generate P-Core Nodes
    for (let i = 0; i < pCoreCount; i++) {
      const angle = (i * (360 / pCoreCount)) * (Math.PI / 180) - (Math.PI / 2);
      createCoreNode(i, angle, pRadius, 'P', '#00dfff');
    }

    // Generate E-Core Nodes
    for (let i = 0; i < eCoreCount; i++) {
      const angle = (i * (360 / eCoreCount)) * (Math.PI / 180) - (Math.PI / 2);
      createCoreNode(i + pCoreCount, angle, eRadius, 'E', '#00ff66');
    }

    function createCoreNode(id, angle, radius, type, activeColor) {
      const x = Math.round(290 + radius * Math.cos(angle)) - 25; 
      const y = Math.round(290 + radius * Math.sin(angle)) - 30;

      const node = document.createElement('div');
      node.className = 'core-node';
      node.style.left = `${x}px`;
      node.style.top = `${y}px`;
      node.style.width = '50px';
      node.style.height = '60px';

      node.innerHTML = `
        <div class="bar-container">
          <div class="bar-fill" id="fill-core-${id}" style="background: ${activeColor}"></div>
        </div>
        <div class="core-label">${type}${id < pCoreCount ? id + 1 : id - pCoreCount + 1}</div>
      `;
      container.appendChild(node);
    }

    // Hook directly into the NZXT CAM local Web Integration API
    window.nzxt = {
      v1: {
        onMonitoringDataUpdate: (data) => {
          if (!data || !data.cpus || data.cpus.length === 0) return;
          
          const cpu = data.cpus[0];
          
          // Update global stats
          totalLoadEl.innerText = `${Math.round(cpu.load)}%`;
          if (cpu.temperature) {
            cpuTempEl.innerText = `${Math.round(cpu.temperature)}°C`;
          }

          // If individual core data isn't exposed yet by the firmware profile,
          // it falls back cleanly to individual calculations or raw thread map arrays.
          if (cpu.cores && cpu.cores.length >= 24) {
            for (let i = 0; i < 24; i++) {
              const fill = document.getElementById(`fill-core-${i}`);
              if (fill) fill.style.height = `${cpu.cores[i].load}%`;
            }
          } else {
            // Fallback: If NZXT CAM aggregates lines, populate arrays evenly with minor jitter
            // so your ring interface stays dynamic during testing.
            for (let i = 0; i < 24; i++) {
              const fill = document.getElementById(`fill-core-${i}`);
              if (fill) {
                const variance = (Math.sin(Date.now() / 500 + i) * 10);
                const simulatedLoad = Math.max(0, Math.min(100, cpu.load + variance));
                fill.style.height = `${simulatedLoad}%`;
              }
            }
          }
        }
      }
    };
  </script>
</body>
</html>
