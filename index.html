<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>285K Radial Progress Monitor v2</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 640px;
      height: 640px;
      background-color: #000000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      user-select: none;
    }
    canvas {
      width: 640px;
      height: 640px;
      background: #000;
    }
  </style>
</head>
<body>

  <canvas id="krakenCanvas" width="640" height="640"></canvas>

  <script>
    const canvas = document.getElementById('krakenCanvas');
    const ctx = canvas.getContext('2d');

    const CTR = 320; 
    const MAX_RAD = 310; 
    const R3 = MAX_RAD;          
    const R2 = MAX_RAD * 0.66;   
    const R1 = MAX_RAD * 0.33;   

    let globalLoad = 5; // Start with a generic placeholder above 1%
    let globalTemp = 0;
    let coreLoads = new Array(24).fill(5); 

    let waveTime = 0;

    function getDynamicColor(load) {
      if (load >= 90) return '#ff3333'; 
      if (load >= 40) return '#ff9900'; 
      return '#00ff66';                
    }

    function render() {
      ctx.clearRect(0, 0, 640, 640);
      waveTime += 0.05;

      // --- 1. OUTER RING: 16 E-CORES ---
      const eCount = 16;
      for (let i = 0; i < eCount; i++) {
        const startAng = (i * (360 / eCount) - 90 + 0.5) * Math.PI / 180;
        const endAng = ((i + 1) * (360 / eCount) - 90 - 0.5) * Math.PI / 180;
        const load = coreLoads[i + 8]; 

        ctx.beginPath();
        ctx.arc(CTR, CTR, R3, startAng, endAng, false);
        ctx.arc(CTR, CTR, R2, endAng, startAng, true);
        ctx.closePath();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
        ctx.fill();
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        ctx.stroke();

        const fillRadInward = R3 - ((load / 100) * (R3 - R2));

        ctx.beginPath();
        ctx.arc(CTR, CTR, R3, startAng, endAng, false);
        ctx.arc(CTR, CTR, fillRadInward, endAng, startAng, true);
        ctx.closePath();
        ctx.fillStyle = getDynamicColor(load);
        ctx.fill();

        const midAng = (startAng + endAng) / 2;
        const midRad = (R2 + R3) / 2;
        const tx = CTR + midRad * Math.cos(midAng);
        const ty = CTR + midRad * Math.sin(midAng) + 5;

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 15px sans-serif';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.round(load)}%`, tx, ty);
      }

      // --- 2. MIDDLE RING: 8 P-CORES ---
      const pCount = 8;
      for (let i = 0; i < pCount; i++) {
        const startAng = (i * (360 / pCount) - 90 + 0.7) * Math.PI / 180;
        const endAng = ((i + 1) * (360 / pCount) - 90 - 0.7) * Math.PI / 180;
        const load = coreLoads[i]; 

        ctx.beginPath();
        ctx.arc(CTR, CTR, R2, startAng, endAng, false);
        ctx.arc(CTR, CTR, R1, endAng, startAng, true);
        ctx.closePath();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
        ctx.fill();
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        ctx.stroke();

        const fillRadInward = R2 - ((load / 100) * (R2 - R1));

        ctx.beginPath();
        ctx.arc(CTR, CTR, R2, startAng, endAng, false);
        ctx.arc(CTR, CTR, fillRadInward, endAng, startAng, true);
        ctx.closePath();
        ctx.fillStyle = getDynamicColor(load);
        ctx.fill();

        const midAng = (startAng + endAng) / 2;
        const midRad = (R1 + R2) / 2;
        const tx = CTR + midRad * Math.cos(midAng);
        const ty = CTR + midRad * Math.sin(midAng) + 6;

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 19px sans-serif';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.round(load)}%`, tx, ty);
      }

      // --- 3. INNER CIRCLE: LIQUID TOTAL LOAD ENGINE ---
      ctx.save();
      ctx.beginPath();
      ctx.arc(CTR, CTR, R1, 0, Math.PI * 2);
      ctx.closePath();
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.clip(); 

      const fillHeight = (globalLoad / 100) * (R1 * 2);
      const waterLevelY = (CTR + R1) - fillHeight;

      ctx.beginPath();
      ctx.moveTo(CTR - R1, CTR + R1);
      
      for (let x = CTR - R1; x <= CTR + R1; x++) {
        const wave1 = Math.sin(x * 0.06 + waveTime) * 5;
        const wave2 = Math.cos(x * 0.03 + waveTime * 1.5) * 3;
        ctx.lineTo(x, waterLevelY + wave1 + wave2);
      }
      
      ctx.lineTo(CTR + R1, CTR + R1);
      ctx.closePath();
      
      let liquidGrad = ctx.createLinearGradient(CTR, CTR - R1, CTR, CTR + R1);
      liquidGrad.addColorStop(0, '#00ffcc');
      liquidGrad.addColorStop(0.5, '#0066ff');
      liquidGrad.addColorStop(1, '#001133');
      ctx.fillStyle = liquidGrad;
      ctx.fill();
      ctx.restore();

      // --- 4. CENTER HUD OVERLAY TEXT ---
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      
      ctx.font = '800 52px sans-serif';
      ctx.fillText(`${Math.round(globalLoad)}%`, CTR, CTR - 5);
      
      ctx.font = 'bold 11px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('TOTAL CPU LOAD', CTR, CTR + 20);

      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = '#00ff66';
      ctx.fillText(globalTemp > 0 ? `${globalTemp}°C` : '--°C', CTR, CTR + 42);

      requestAnimationFrame(render);
    }

    // --- RE-ENGINEERED FAILSAFE HOOK ---
    window.nzxt = {
      v1: {
        onMonitoringDataUpdate: (data) => {
          // Absolute structural check
          if (!data || !data.cpus || !data.cpus[0]) return;
          const cpu = data.cpus[0];

          // Direct binding with fallback protection to avoid sticking at 1%
          globalLoad = (typeof cpu.load === 'number') ? Math.max(1, cpu.load) : 5;
          if (cpu.temperature) globalTemp = cpu.temperature;

          // Target core extraction cleanly across both common profiles
          const rawCores = cpu.cores || cpu.threads || [];

          if (rawCores.length >= 24) {
            for (let i = 0; i < 24; i++) {
              let val = typeof rawCores[i] === 'object' ? rawCores[i].load : rawCores[i];
              coreLoads[i] = (typeof val === 'number') ? val : globalLoad;
            }
          } else {
            // Failsafe: distribute true global load across the matrix natively
            for (let i = 0; i < 24; i++) {
              coreLoads[i] = globalLoad;
            }
          }
        }
      }
    };

    render();
  </script>
</body>
</html>
